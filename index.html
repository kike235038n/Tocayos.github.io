<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario General - Contaduría</title>

    <link rel="stylesheet" href="index.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>

<body>

<div class="container">

    <!-- MENU -->
    <div id="pantalla-menu" class="pantalla activa">

        <div class="header-title">
            <h2>Sistema de Inventario General</h2>
            <h3>Control Multiproducto</h3>
        </div>

        <div class="menu-grid">

            <div class="card-btn" onclick="cambiarPantalla('pantalla-formulario')">
                <div class="card-icon">📝</div>
                <div class="card-title">Registrar Producto</div>
            </div>

            <div class="card-btn" onclick="irAVista()">
                <div class="card-icon">📊</div>
                <div class="card-title">Ver Tabla</div>
            </div>

            <div class="card-btn" onclick="mostrarQR()">
                <div class="card-icon">📲</div>
                <div class="card-title">Descargar QR</div>
            </div>

            <div class="card-btn" onclick="document.getElementById('inputQRImagen').click()">
                <div class="card-icon">🔍</div>
                <div class="card-title">Cargar por QR</div>
            </div>

            <div class="card-btn" onclick="descargarExcel()">
                <div class="card-icon">📥</div>
                <div class="card-title">Descargar Excel</div>
            </div>

            <div class="card-btn" onclick="document.getElementById('inputExcel').click()">
                <div class="card-icon">📂</div>
                <div class="card-title">Cargar Excel</div>
            </div>

            <input type="file"
                   id="inputExcel"
                   accept=".xlsx"
                   style="display:none"
                   onchange="cargarExcel(event)">

            <input type="file"
                   id="inputQRImagen"
                   accept="image/*"
                   style="display:none"
                   onchange="escanearArchivo(event)">
        </div>
    </div>

    <!-- FORMULARIO -->
    <div id="pantalla-formulario" class="pantalla">

        <div class="header-title">
            <h2>Registrar Movimiento de Producto</h2>
        </div>

        <div class="form-container">

            <form id="formKardex" onsubmit="guardarRegistro(event)">

                <div class="form-group">
                    <label>Fecha:</label>
                    <input type="date" id="inFecha" required>
                </div>

                <div class="form-group">
                    <label>Concepto:</label>
                    <input type="text"
                           id="inConcepto"
                           placeholder="Ej. Cubículo #15"
                           required>
                </div>

                <div class="form-group">
                    <label>Código:</label>
                    <input type="text"
                           id="inCodigo"
                           placeholder="Ej. SSD240"
                           required>
                </div>

                <div class="form-group">
                    <label>Producto:</label>
                    <input type="text"
                           id="inProducto"
                           placeholder="Ej. SSD 240GB"
                           required>
                </div>

                <div style="display:flex; gap:15px;">

                    <div class="form-group" style="flex:1;">
                        <label>Entrada:</label>
                        <input type="number"
                               id="inEntrada"
                               min="0"
                               value="0"
                               required>
                    </div>

                    <div class="form-group" style="flex:1;">
                        <label>Salida:</label>
                        <input type="number"
                               id="inSalida"
                               min="0"
                               value="0"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Costo Unitario:</label>
                    <input type="number"
                           id="inUnitario"
                           min="0"
                           step="0.01"
                           required>
                </div>

                <div class="btn-group">
                    <button type="button"
                            class="btn btn-secondary"
                            onclick="cambiarPantalla('pantalla-menu')">
                        Volver
                    </button>

                    <button type="submit"
                            class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- TABLA -->
    <div id="pantalla-vista" class="pantalla">

        <div class="btn-group" style="margin-bottom:20px;">

            <button class="btn btn-secondary"
                    onclick="cambiarPantalla('pantalla-menu')">
                ⬅ Volver
            </button>

            <button class="btn btn-primary"
                    onclick="mostrarQR()">
                📲 Generar QR
            </button>

            <button class="btn btn-primary"
                    onclick="descargarExcel()">
                📥 Descargar Excel
            </button>
        </div>

        <div style="overflow-x:auto;">

            <table id="kardexTable">

                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Concepto</th>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Entrada</th>
                        <th>Salida</th>
                        <th>Existencia</th>
                        <th>Unitario</th>
                        <th>Debe</th>
                        <th>Haber</th>
                        <th>Saldo</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="kardexBody"></tbody>

            </table>
        </div>
    </div>

    <!-- QR -->
    <div id="pantalla-qr" class="pantalla">

        <div class="header-title">
            <h2>Código QR</h2>
        </div>

        <div style="text-align:center; padding:20px;">

            <div id="qrcode"
                 style="display:inline-block;
                        background:white;
                        padding:20px;
                        border-radius:15px;">
            </div>

            <br><br>

            <p id="qr-info"></p>

            <br>

            <div class="btn-group">

                <button class="btn btn-secondary"
                        onclick="cambiarPantalla('pantalla-menu')">
                    Volver
                </button>

                <button class="btn btn-primary"
                        onclick="descargarQRImagen()">
                    Guardar QR
                </button>
            </div>
        </div>
    </div>
</div>

<script>

let registros = [];
let idRegistro = 1;

const BASE_URL = "https://kike235038n.github.io/Tocayos.github.io/";

function cambiarPantalla(id){

    document.querySelectorAll('.pantalla')
        .forEach(p => p.classList.remove('activa'));

    document.getElementById(id)
        .classList.add('activa');
}

function guardarRegistro(e){

    e.preventDefault();

    registros.push({

        id: idRegistro++,

        fecha: document.getElementById('inFecha').value,

        concepto: document.getElementById('inConcepto').value,

        codigo: document.getElementById('inCodigo').value,

        producto: document.getElementById('inProducto').value,

        entrada: Number(document.getElementById('inEntrada').value),

        salida: Number(document.getElementById('inSalida').value),

        unitario: Number(document.getElementById('inUnitario').value)
    });

    document.getElementById('formKardex').reset();

    alert("Movimiento guardado");

    calcularYRenderizarKardex();
}

function irAVista(){

    calcularYRenderizarKardex();

    cambiarPantalla('pantalla-vista');
}

function formatMoney(num){

    return Number(num).toLocaleString('es-MX', {

        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function calcularYRenderizarKardex(){

    const tbody = document.getElementById('kardexBody');

    tbody.innerHTML = '';

    registros.forEach((reg,index)=>{

        const existencia = reg.entrada - reg.salida;

        const debe = reg.entrada * reg.unitario;

        const haber = reg.salida * reg.unitario;

        const saldo = debe - haber;

        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${reg.fecha}</td>
            <td>${reg.concepto}</td>
            <td>${reg.codigo}</td>
            <td>${reg.producto}</td>
            <td>${reg.entrada}</td>
            <td>${reg.salida}</td>
            <td>${existencia}</td>
            <td>${formatMoney(reg.unitario)}</td>
            <td>${formatMoney(debe)}</td>
            <td>${formatMoney(haber)}</td>
            <td>${formatMoney(saldo)}</td>
            <td>
                <button onclick="eliminarRegistro(${index})">
                    🗑️
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

function eliminarRegistro(index){

    registros.splice(index,1);

    calcularYRenderizarKardex();
}

function generarURLConDatos(){

    const json = JSON.stringify(registros);

    const compressed = pako.deflate(json);

    const b64 = btoa(
        String.fromCharCode(...compressed)
    );

    return BASE_URL + "?d=" + encodeURIComponent(b64);
}

function mostrarQR(){

    if(registros.length === 0){

        alert("No hay datos");

        return;
    }

    const url = generarURLConDatos();

    if(url.length > 1800){

        alert(
            "Demasiados registros para generar un QR legible."
        );

        return;
    }

    cambiarPantalla('pantalla-qr');

    const contenedor =
        document.getElementById('qrcode');

    contenedor.innerHTML = '';

    const qrDiv = document.createElement('div');

    contenedor.appendChild(qrDiv);

    new QRCode(qrDiv, {

        text: url,

        width: 420,

        height: 420,

        colorDark: "#000000",

        colorLight: "#ffffff",

        correctLevel: QRCode.CorrectLevel.H
    });

    document.getElementById('qr-info').textContent =
        `${registros.length} registros`;
}

function descargarQRImagen(){

    setTimeout(()=>{

        const canvas =
            document.querySelector('#qrcode canvas');

        if(!canvas){

            alert("QR no encontrado");

            return;
        }

        const link = document.createElement('a');

        link.download = 'inventarioQR.png';

        link.href = canvas.toDataURL("image/png");

        link.click();

    },300);
}

function escanearArchivo(event){

    const file = event.target.files[0];

    if(!file) return;

    event.target.value = '';

    const reader = new FileReader();

    reader.onload = function(e){

        const img = new Image();

        img.onload = function(){

            const canvas =
                document.createElement('canvas');

            const ctx =
                canvas.getContext('2d');

            const scale = 3;

            canvas.width = img.width * scale;

            canvas.height = img.height * scale;

            ctx.fillStyle = "#FFFFFF";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const imageData =
                ctx.getImageData(
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

            const code = jsQR(
                imageData.data,
                imageData.width,
                imageData.height,
                {
                    inversionAttempts: "dontInvert"
                }
            );

            if(!code){

                alert("❌ No se pudo leer el QR");

                return;
            }

            procesarQREscaneado(code.data);
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function procesarQREscaneado(texto){

    try{

        const url = new URL(texto);

        const params =
            new URLSearchParams(url.search);

        const datos = params.get('d');

        if(!datos){

            alert("QR inválido");

            return;
        }

        const json = pako.inflate(

            Uint8Array.from(
                atob(decodeURIComponent(datos)),
                c => c.charCodeAt(0)
            ),

            { to:'string' }
        );

        registros = JSON.parse(json);

        calcularYRenderizarKardex();

        cambiarPantalla('pantalla-vista');

        alert("QR cargado correctamente");

    }catch(error){

        console.error(error);

        alert("Error al leer QR");
    }
}

async function descargarExcel(){

    if(registros.length === 0){

        alert("No hay datos");

        return;
    }

    const workbook =
        new ExcelJS.Workbook();

    const worksheet =
        workbook.addWorksheet('Kardex');

    worksheet.addRow([
        'Fecha',
        'Concepto',
        'Código',
        'Producto',
        'Entrada',
        'Salida',
        'Existencia',
        'Unitario',
        'Debe',
        'Haber',
        'Saldo'
    ]);

    registros.forEach(reg=>{

        const existencia =
            reg.entrada - reg.salida;

        const debe =
            reg.entrada * reg.unitario;

        const haber =
            reg.salida * reg.unitario;

        const saldo =
            debe - haber;

        worksheet.addRow([

            reg.fecha,
            reg.concepto,
            reg.codigo,
            reg.producto,
            reg.entrada,
            reg.salida,
            existencia,
            reg.unitario,
            debe,
            haber,
            saldo
        ]);
    });

    const buffer =
        await workbook.xlsx.writeBuffer();

    saveAs(
        new Blob([buffer]),
        'inventario.xlsx'
    );
}

</script>

</body>
</html>
